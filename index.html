  <body>
    <div id="root"></div>

    <!-- World Environment Day Bumper Ad Popup -->
    <div id="wed-popup" class="wed-popup-overlay">
      <div class="wed-popup-container">
        <button class="wed-popup-close" id="wed-close-btn" aria-label="Close popup">&times;</button>

        <video
          id="wed-video"
          class="wed-popup-video"
          src="./wed-bumper-ad.mp4"
          preload="auto"
          muted
          autoplay
          playsinline
          webkit-playsinline
          loop="false"
        ></video>

        <div class="wed-popup-cta" id="wed-cta">
          <svg class="wed-leaf-icon" viewBox="0 0 64 64" fill="none">
            <path d="M32 52C32 52 16 38 16 24C16 14 22 8 32 8C42 8 48 14 48 24C48 38 32 52 32 52Z" fill="#fff"/>
            <path d="M32 20V44" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
            <path d="M32 28C32 28 38 24 40 18" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M32 34C32 34 26 30 24 24" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <h2>Happy World Environment Day</h2>
          <p>Join Syscycl in making Brantford plastic-free</p>
          <a href="./#/register" class="wed-popup-btn" id="wed-cta-btn">Join the Movement</a>
        </div>

        <button class="wed-skip-btn" id="wed-skip">Skip Ad</button>
      </div>
    </div>

    <style>
      .wed-popup-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      .wed-popup-overlay.active { opacity: 1; visibility: visible; }

      .wed-popup-container {
        position: relative;
        width: 90%;
        max-width: 420px;
        aspect-ratio: 3/4;
        max-height: 80vh;
        background: #000;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        transform: scale(0.88) translateY(30px);
        transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
      }
      .wed-popup-overlay.active .wed-popup-container {
        transform: scale(1) translateY(0);
      }

      .wed-popup-close {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(0,0,0,0.5);
        color: #fff;
        border: 1.5px solid rgba(255,255,255,0.2);
        font-size: 20px;
        cursor: pointer;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        line-height: 1;
        padding-bottom: 2px;
      }
      .wed-popup-close:hover {
        background: rgba(0,0,0,0.75);
        transform: scale(1.1);
        border-color: rgba(255,255,255,0.4);
      }

      .wed-popup-video {
        width: 100%;
        height: 100%;
        -o-object-fit: cover;
           object-fit: cover;
        display: block;
        background: #000;
        transform: translateZ(0);
        will-change: transform;
      }

      .wed-popup-cta {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        background: rgba(0,0,0,0.5);
        z-index: 10;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease;
        pointer-events: none;
      }
      .wed-popup-cta.show {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
      .wed-popup-cta h2 {
        color: #fff;
        font-size: 1.8rem;
        font-weight: 800;
        margin: 12px 0 6px;
        text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        line-height: 1.3;
      }
      .wed-popup-cta p {
        color: rgba(255,255,255,0.9);
        font-size: 0.95rem;
        margin-bottom: 20px;
        text-shadow: 0 1px 6px rgba(0,0,0,0.5);
      }
      .wed-popup-btn {
        display: inline-block;
        padding: 14px 36px;
        background: #16a34a;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        border-radius: 30px;
        box-shadow: 0 6px 20px rgba(22,163,74,0.4);
        animation: wedBtnPulse 2s ease-in-out infinite;
        cursor: pointer;
        border: none;
        pointer-events: auto;
      }
      .wed-popup-btn:hover {
        background: #15803d;
        transform: scale(1.05);
      }
      .wed-leaf-icon {
        width: 56px;
        height: 56px;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
      }
      @keyframes wedBtnPulse {
        0%, 100% { box-shadow: 0 6px 20px rgba(22,163,74,0.4); }
        50% { box-shadow: 0 6px 20px rgba(22,163,74,0.4), 0 0 0 10px rgba(22,163,74,0); }
      }

      .wed-skip-btn {
        position: absolute;
        bottom: 14px;
        right: 14px;
        padding: 6px 14px;
        background: rgba(0,0,0,0.5);
        color: rgba(255,255,255,0.85);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        font-size: 0.8rem;
        cursor: pointer;
        z-index: 20;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease;
      }
      .wed-skip-btn.show {
        opacity: 1;
        visibility: visible;
      }
      .wed-skip-btn:hover {
        background: rgba(0,0,0,0.7);
        color: #fff;
      }

      .wed-popup-overlay.fade-out {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      .wed-popup-overlay.fade-out .wed-popup-container {
        transform: scale(0.92) translateY(10px);
        transition: transform 0.5s ease;
      }

      @media (max-width: 480px) {
        .wed-popup-container { width: 95%; max-height: 70vh; border-radius: 12px; }
        .wed-popup-cta h2 { font-size: 1.4rem; }
        .wed-popup-btn { padding: 12px 28px; font-size: 0.9rem; }
        .wed-leaf-icon { width: 48px; height: 48px; }
      }
    </style>

    <script>
      // World Environment Day Bumper Ad Controller
      window.WEDPopup = (function() {
        // Prevent re-show in same session
        if (sessionStorage.getItem("wedPopupV4Shown")) return { close: function(){} };

        var popup = document.getElementById("wed-popup");
        var video = document.getElementById("wed-video");
        var cta = document.getElementById("wed-cta");
        var skip = document.getElementById("wed-skip");
        var closeBtn = document.getElementById("wed-close-btn");
        var ctaBtn = document.getElementById("wed-cta-btn");
        var isPlaying = false;
        var isClosed = false;

        function closeWedPopup() {
          if (isClosed) return;
          isClosed = true;
          try { video.pause(); } catch(e) {}
          try { video.currentTime = 0; } catch(e) {}
          popup.classList.add("fade-out");
          cta.classList.remove("show");
          skip.classList.remove("show");
          setTimeout(function() {
            popup.classList.remove("active", "fade-out");
          }, 500);
        }

        // GLOBAL: Expose close function for any onclick handlers
        window.closeWedPopup = closeWedPopup;

        // Button click handlers
        closeBtn.addEventListener("click", function(e) { e.stopPropagation(); closeWedPopup(); });
        skip.addEventListener("click", function(e) { e.stopPropagation(); closeWedPopup(); });
        ctaBtn.addEventListener("click", function(e) { closeWedPopup(); });
        popup.addEventListener("click", function(e) { if (e.target === popup) closeWedPopup(); });

        // Aggressive autoplay with retries
        function attemptPlay(retryCount) {
          if (isClosed || isPlaying) return;
          retryCount = retryCount || 0;

          var playPromise = video.play();
          if (playPromise !== undefined) {
            playPromise.then(function() {
              isPlaying = true;
              video.muted = true; // Ensure stays muted for autoplay policy
            }).catch(function(err) {
              // Retry up to 3 times with increasing delays
              if (retryCount < 3) {
                setTimeout(function() {
                  attemptPlay(retryCount + 1);
                }, 300 * (retryCount + 1));
              } else {
                // All retries failed - show CTA as fallback
                cta.classList.add("show");
              }
            });
          }
        }

        // Start everything
        function init() {
          // Pre-load video
          video.load();

          // Show popup after 3s delay
          setTimeout(function() {
            if (isClosed) return;
            popup.classList.add("active");
            sessionStorage.setItem("wedPopupV4Shown", "true");

            // Make popup visible first, then play
            requestAnimationFrame(function() {
              attemptPlay(0);
            });

            // Show skip button after 2s
            setTimeout(function() {
              skip.classList.add("show");
            }, 2000);

            // When video ends, show CTA
            video.addEventListener("ended", function() {
              cta.classList.add("show");
              setTimeout(closeWedPopup, 4000);
            }, { once: true });

            // Safety: force close after 20s
            setTimeout(closeWedPopup, 20000);
          }, 3000);
        }

        init();

        return { close: closeWedPopup };
      })();
    </script>
