<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syscycl</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  
    <!-- World Environment Day Popup -->
    <div id="wed-popup" class="wed-overlay">
      <div class="wed-box">
        <button class="wed-x" id="wed-x">&times;</button>
        <video id="wed-video" class="wed-video" src="/wed-bumper-ad.mp4" preload="auto" autoplay muted playsinline webkit-playsinline></video>
        <div class="wed-text wed-stage1" id="wed-stage1"><div class="wed-stage1-line">Help us to save the environment</div></div>
        <div class="wed-text wed-stage2" id="wed-stage2">
          <svg class="wed-leaf" viewBox="0 0 64 64" fill="none"><path d="M32 52C32 52 16 38 16 24C16 14 22 8 32 8C42 8 48 14 48 24C48 38 32 52 32 52Z" fill="#fff"/><path d="M32 20V44" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/><path d="M32 28C32 28 38 24 40 18" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/></svg>
          <div class="wed-stage2-line">Happy World Environment Day</div>
          <div class="wed-stage2-sub">Join Syscycl in making Brantford plastic-free</div>
          <a href="/#/register" class="wed-cta" id="wed-cta-btn">Join the Movement</a>
        </div>
        <button class="wed-skip" id="wed-skip">Skip Ad</button>
      </div>
    </div>
    <style>
      .wed-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;visibility:hidden;transition:opacity .5s ease,visibility .5s ease}
      .wed-overlay.active{opacity:1;visibility:visible}
      .wed-box{position:relative;width:90%;max-width:420px;aspect-ratio:3/4;max-height:80vh;background:#000;border-radius:16px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.6);transform:scale(0.88) translateY(30px);transition:transform .6s cubic-bezier(0.34,1.56,0.64,1)}
      .wed-overlay.active .wed-box{transform:scale(1) translateY(0)}
      .wed-x{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;border:1.5px solid rgba(255,255,255,0.2);font-size:20px;cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center;transition:all .2s ease;line-height:1;padding-bottom:2px}
      .wed-x:hover{background:rgba(0,0,0,0.75);transform:scale(1.1)}
      .wed-video{width:100%;height:100%;object-fit:cover;display:block;background:#000}
      .wed-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 24px 48px;text-align:center;z-index:10;pointer-events:none;opacity:0;transition:opacity .6s ease}
      .wed-text.show{opacity:1;pointer-events:auto}
      .wed-stage1-line{color:#fff;font-size:1.5rem;font-weight:800;text-shadow:0 2px 12px rgba(0,0,0,0.6),0 0 30px rgba(22,163,74,0.3);animation:wedPulse 2s ease-in-out infinite}
      .wed-stage2-line{color:#fff;font-size:1.8rem;font-weight:800;margin-bottom:6px;text-shadow:0 2px 12px rgba(0,0,0,0.5)}
      .wed-stage2-sub{color:rgba(255,255,255,0.9);font-size:.95rem;margin-bottom:20px;text-shadow:0 1px 6px rgba(0,0,0,0.5)}
      .wed-leaf{width:56px;height:56px;margin-bottom:12px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3));animation:wedFloat 3s ease-in-out infinite}
      .wed-cta{display:inline-block;padding:14px 36px;background:#16a34a;color:#fff;font-size:1rem;font-weight:700;text-decoration:none;border-radius:30px;box-shadow:0 6px 20px rgba(22,163,74,0.4);animation:wedCtaPulse 2s ease-in-out infinite;pointer-events:auto}
      .wed-cta:hover{background:#15803d;transform:scale(1.05)}
      .wed-skip{position:absolute;bottom:14px;right:14px;padding:6px 14px;background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.2);border-radius:6px;font-size:.8rem;cursor:pointer;z-index:30;opacity:0;visibility:hidden;transition:opacity .3s ease}
      .wed-skip.show{opacity:1;visibility:visible}
      .wed-overlay.fade-out{opacity:0;visibility:hidden;transition:opacity .5s ease,visibility .5s ease}
      .wed-overlay.fade-out .wed-box{transform:scale(0.92) translateY(10px);transition:transform .5s ease}
      @keyframes wedPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.02);opacity:.9}}
      @keyframes wedFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}
      @keyframes wedCtaPulse{0%,100%{box-shadow:0 6px 20px rgba(22,163,74,0.4)}50%{box-shadow:0 6px 20px rgba(22,163,74,0.4),0 0 0 10px rgba(22,163,74,0)}}
      @media(max-width:480px){.wed-box{width:95%;max-height:70vh;border-radius:12px}.wed-stage1-line{font-size:1.3rem}.wed-stage2-line{font-size:1.5rem}.wed-cta{padding:12px 28px;font-size:.9rem}}
    </style>
    <script>
      window.closeWedPopup=function(){var p=document.getElementById("wed-popup"),v=document.getElementById("wed-video");try{v.pause()}catch(e){}p.classList.add("fade-out");document.getElementById("wed-stage1").classList.remove("show");document.getElementById("wed-stage2").classList.remove("show");document.getElementById("wed-skip").classList.remove("show");setTimeout(function(){p.classList.remove("active","fade-out")},500)};
      (function(){if(sessionStorage.getItem("wedPopupV5Shown"))return;var popup=document.getElementById("wed-popup"),video=document.getElementById("wed-video"),stage1=document.getElementById("wed-stage1"),stage2=document.getElementById("wed-stage2"),skip=document.getElementById("wed-skip");document.getElementById("wed-x").addEventListener("click",window.closeWedPopup);skip.addEventListener("click",window.closeWedPopup);document.getElementById("wed-cta-btn").addEventListener("click",window.closeWedPopup);popup.addEventListener("click",function(e){if(e.target===popup)window.closeWedPopup()});setTimeout(function(){popup.classList.add("active");sessionStorage.setItem("wedPopupV5Shown","true");stage1.classList.add("show");setTimeout(function(){skip.classList.add("show")},2000);video.addEventListener("ended",function(){stage1.classList.remove("show");setTimeout(function(){stage2.classList.add("show")},2000);setTimeout(window.closeWedPopup,8000)},{once:true});setTimeout(window.closeWedPopup,20000)},3000)})();
    </script>

  </body>
</html>
