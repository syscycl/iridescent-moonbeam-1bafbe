<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Syscycl - Free Door-to-Door PET Bottle Recycling | Brantford, ON</title>
    <meta name="description" content="Sign up for FREE weekly PET bottle pickup from your doorstep in Brantford. An Assumption College School (Student BIZ) Initiative." />
    <!-- OG Meta Tags for WhatsApp/Facebook sharing -->
    <meta property="og:title" content="Happy World Environment Day - Join Syscycl!" />
    <meta property="og:description" content="Sign up for FREE weekly PET bottle pickup from your doorstep in Brantford. An Assumption College School (Student BIZ) Initiative." />
    <meta property="og:image" content="https://syscycl.com/world-environment-day-popup.jpg" />
    <meta property="og:url" content="https://syscycl.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Happy World Environment Day - Join Syscycl!" />
    <meta name="twitter:description" content="Free door-to-door PET bottle recycling in Brantford. Student BIZ initiative." />
    <meta name="twitter:image" content="https://syscycl.com/world-environment-day-popup.jpg" />
  </head>
  <body>
    <div id="root"></div>

    <!-- World Environment Day Popup -->
    <div id="wed-popup" class="wed-overlay">
      <div class="wed-box" id="wed-box">
        <button class="wed-x" id="wed-x">&times;</button>

        <!-- Video: starts INVISIBLE. Only shown if autoplay succeeds. -->
        <!-- controls=NO, disableremoteplayback, x-webkit-airplay=deny -->
        <video
          id="wed-video"
          class="wed-video"
          src="/wed-bumper-ad.mp4"
          preload="auto"
          muted
          loop="false"
          playsinline
          webkit-playsinline
          disableremoteplayback
          x-webkit-airplay="deny"
        ></video>

        <!-- Stage 1: "Help us to save the environment" shown during video -->
        <div class="wed-text-overlay" id="wed-stage1">
          <span class="wed-msg-line">Help us to save the environment</span>
        </div>

        <!-- Stage 2: "Happy World Environment Day" shown after video + 2s gap -->
        <div class="wed-text-overlay" id="wed-stage2">
          <svg class="wed-leaf" viewBox="0 0 64 64" fill="none">
            <path d="M32 52C32 52 16 38 16 24C16 14 22 8 32 8C42 8 48 14 48 24C48 38 32 52 32 52Z" fill="#fff"/>
            <path d="M32 20V44" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
            <path d="M32 28C32 28 38 24 40 18" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <span class="wed-msg-line">Happy World Environment Day</span>
          <span class="wed-msg-sub">Join Syscycl in making Brantford plastic-free</span>
          <a href="/#/register" class="wed-cta-btn" id="wed-cta">Join the Movement</a>
        </div>

        <!-- Skip Ad button -->
        <button class="wed-skip" id="wed-skip">Skip Ad</button>
      </div>
    </div>

    <style>
      /* CRITICAL: Hide ALL native video controls via CSS */
      .wed-video::-webkit-media-controls,
      .wed-video::-webkit-media-controls-overlay-play-button,
      .wed-video::-webkit-media-controls-play-button,
      .wed-video::-webkit-media-controls-start-playback-button,
      .wed-video::-webkit-media-controls-panel,
      .wed-video::-webkit-media-controls-enclosure,
      .wed-video::-webkit-media-controls-timeline,
      .wed-video::-webkit-media-controls-current-time-display,
      .wed-video::-webkit-media-controls-time-remaining-display,
      .wed-video::-webkit-media-controls-mute-button,
      .wed-video::-webkit-media-controls-volume-slider,
      .wed-video::-webkit-media-controls-fullscreen-button {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
      /* Firefox */
      .wed-video::-moz-media-controls { display: none !important; }
      /* Video element itself: no controls attribute, starts invisible */
      .wed-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        opacity: 0;
        background: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        pointer-events: none;
      }
      /* Only show video when .playing class is added by JS */
      .wed-video.playing {
        opacity: 1;
        transition: opacity 0.3s ease;
      }

      .wed-overlay { position: fixed; inset: 0; z-index: 99999; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; visibility: hidden; transition: opacity 0.5s ease, visibility 0.5s ease; }
      .wed-overlay.active { opacity: 1; visibility: visible; }
      .wed-box { position: relative; width: 90%; max-width: 420px; aspect-ratio: 3/4; max-height: 80vh; background: linear-gradient(135deg, #0a3d1a 0%, #16a34a 50%, #0a3d1a 100%); border-radius: 16px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.6); transform: scale(0.88) translateY(30px); transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1); }
      .wed-overlay.active .wed-box { transform: scale(1) translateY(0); }
      .wed-x { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.5); color: #fff; border: 1.5px solid rgba(255,255,255,0.2); font-size: 20px; cursor: pointer; z-index: 30; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; line-height: 1; padding-bottom: 2px; }
      .wed-x:hover { background: rgba(0,0,0,0.75); transform: scale(1.1); }
      .wed-text-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 0 24px 48px; text-align: center; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
      .wed-text-overlay.show { opacity: 1; pointer-events: auto; }
      .wed-msg-line { color: #fff; font-size: 1.6rem; font-weight: 800; line-height: 1.3; text-shadow: 0 2px 12px rgba(0,0,0,0.6), 0 0 30px rgba(0,0,0,0.3); }
      .wed-msg-sub { color: rgba(255,255,255,0.9); font-size: 0.95rem; margin: 8px 0 20px; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
      .wed-leaf { width: 52px; height: 52px; margin-bottom: 10px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); animation: wedFloat 3s ease-in-out infinite; }
      .wed-cta-btn { display: inline-block; padding: 14px 36px; background: #fff; color: #16a34a; font-size: 1rem; font-weight: 700; text-decoration: none; border-radius: 30px; box-shadow: 0 6px 20px rgba(0,0,0,0.3); animation: wedCtaPulse 2s ease-in-out infinite; pointer-events: auto; }
      .wed-cta-btn:hover { background: #f0fdf4; transform: scale(1.05); }
      .wed-skip { position: absolute; bottom: 14px; right: 14px; padding: 6px 14px; background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; font-size: 0.8rem; cursor: pointer; z-index: 30; opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
      .wed-skip.show { opacity: 1; visibility: visible; }
      .wed-overlay.fade-out { opacity: 0; visibility: hidden; transition: opacity 0.7s ease, visibility 0.7s ease; }
      .wed-overlay.fade-out .wed-box { transform: scale(0.92) translateY(10px); transition: transform 0.7s ease; }
      @keyframes wedFloat { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-6px) rotate(3deg); } }
      @keyframes wedCtaPulse { 0%,100% { box-shadow: 0 6px 20px rgba(0,0,0,0.3); } 50% { box-shadow: 0 6px 20px rgba(0,0,0,0.3), 0 0 0 10px rgba(255,255,255,0); } }
      @media(max-width:480px){ .wed-box{width:95%;max-height:70vh;border-radius:12px} .wed-msg-line{font-size:1.3rem} .wed-cta-btn{padding:12px 28px;font-size:0.9rem} }
    </style>

    <script>
      // === WED Popup Controller ===
      // Video starts INVISIBLE. Only shown if autoplay succeeds.
      // If autoplay fails -> final message shown immediately. NO play button ever.

      window.closeWedPopup = function() {
        var p = document.getElementById("wed-popup");
        var v = document.getElementById("wed-video");
        try { v.pause(); v.currentTime = 0; } catch(e) {}
        p.classList.add("fade-out");
        document.getElementById("wed-stage1").classList.remove("show");
        document.getElementById("wed-stage2").classList.remove("show");
        document.getElementById("wed-skip").classList.remove("show");
        setTimeout(function() { p.classList.remove("active","fade-out"); }, 700);
      };

      (function() {
        if (sessionStorage.getItem("wedPopupV8Shown")) return;

        var popup = document.getElementById("wed-popup");
        var video = document.getElementById("wed-video");
        var stage1 = document.getElementById("wed-stage1");
        var stage2 = document.getElementById("wed-stage2");
        var skip = document.getElementById("wed-skip");
        var failed = false;
        var retries = 0;

        // Button handlers
        document.getElementById("wed-x").addEventListener("click", function(e) { e.stopPropagation(); window.closeWedPopup(); });
        skip.addEventListener("click", function(e) { e.stopPropagation(); window.closeWedPopup(); });
        document.getElementById("wed-cta").addEventListener("click", function() { window.closeWedPopup(); });
        popup.addEventListener("click", function(e) { if (e.target === popup) window.closeWedPopup(); });

        function goToFinal() {
          if (failed) return;
          failed = true;
          stage1.classList.remove("show");
          stage2.classList.add("show");
          setTimeout(window.closeWedPopup, 6000);
        }

        function tryPlay() {
          if (failed || retries >= 5) return;
          retries++;

          video.muted = true;
          video.volume = 0;

          var p = video.play();
          if (p && p.catch) {
            p.catch(function() {
              setTimeout(tryPlay, 200 * retries);
            });
          }
        }

        // Show popup after 3s
        setTimeout(function() {
          popup.classList.add("active");
          sessionStorage.setItem("wedPopupV8Shown", "true");

          // Load and attempt play
          video.load();
          tryPlay();

          // Show stage 1 text
          stage1.classList.add("show");

          // Show Skip after 2s
          setTimeout(function() { skip.classList.add("show"); }, 2000);

          // If video starts playing -> make it visible
          video.addEventListener("playing", function() {
            video.classList.add("playing");
          }, { once: true });

          // If not playing after 1.2s -> go to final message (no play button shown)
          setTimeout(function() {
            if (video.paused && !video.classList.contains("playing")) {
              goToFinal();
            }
          }, 1200);

          // Video ended normally
          video.addEventListener("ended", function() {
            stage1.classList.remove("show");
            video.classList.remove("playing");
            setTimeout(function() { stage2.classList.add("show"); }, 2000);
            setTimeout(window.closeWedPopup, 6000);
          }, { once: true });

          // Safety close
          setTimeout(window.closeWedPopup, 20000);
        }, 3000);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
